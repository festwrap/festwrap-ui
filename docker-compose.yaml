services:
  app:
    image: festwrap-ui:${VERSION:-latest}
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - ${ENV_FILE:-.env}
    environment:
      BACKEND_HOST: "server"
      BACKEND_PORT: "8080"
    ports:
      - "${PORT:-3000}:3000"
    networks:
      - default

  server:
    image: festwrap-server:${BACKEND_VERSION:-latest}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    networks:
      - default

networks:
  default:
